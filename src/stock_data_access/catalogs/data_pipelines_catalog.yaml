# Authoritative list of quant-data-engine ingestion pipelines for monitoring UI.
# job_status_key must match JobStatusRepository job_type and pipeline_tasks.task_type (domain=data_collection).
# Scheduling matches quant-data-engine/start.sh + crontab*.txt (see repo).
#
# DAG dependency fields (for pipeline orchestration and visualization):
#   group:               probe (Tushare gate) | layer0 (independent) | layer1 (depends on L0) | layer2 (depends on L1) | layer3 (analysis)
#   depends_on:          list of pipeline ids that must be complete before this one can start
#   trigger_on_complete: false = keep existing cron schedule unchanged (safe default, backward compatible)
#                        true  = dispatcher will auto-trigger when all depends_on are complete
#   run_mode:            cron | loop | on_demand  (informational only, does not affect execution)

pipelines:

  # ── Probe: Tushare data-availability gate ────────────────────────────────────

  - id: tushare_daily_ready
    label: Tushare日线就绪探测
    job_status_key: tushare_daily_ready
    group: probe
    depends_on: []
    trigger_on_complete: false   # probe 本身由 cron 15:10 直接启动，不由 dispatcher 触发
    run_mode: cron
    schedule_hint: "Supercronic 工作日 15:10 启动 run_tushare_probe.py；轮询探测直到 Tushare 日线数据可用，写入 pipeline_tasks(complete)；超时 6h 则 failed"
    freshness:
      database: finance
      collection: pipeline_tasks
      field: updated_at
      field_kind: datetime

  # ── Layer 0: Independent data collection (direct from Tushare / external) ─────

  - id: stock_info
    label: 股票基础信息
    job_status_key: stock_info
    group: layer0
    depends_on: []
    trigger_on_complete: false   # 偶发更新（上市/退市），保持 cron 独立调度
    run_mode: cron
    schedule_hint: "Supercronic 工作日 17:20 → daily_market_sync.sh stockinfo"
    freshness:
      # list_date is the content field (IPO date of the last listed stock), not the
      # sync timestamp. We monitor by job_status so data-pulse shows when the sync
      # last ran rather than a static IPO date that changes only on new listings.
      database: finance
      collection: job_status
      field: completed_at
      field_kind: datetime
      filter: { job_type: stock_info }
    # ── Data contract: reference snapshot ──────────────────────────────────────
    # stock_info is the listed-universe reference other contracts depend on
    # (e.g. financial_sync's per-period coverage). It is a full snapshot, not a
    # date series, so completeness = "collection holds >= min_docs rows".
    # On a fresh system this is empty => violated => repaired by run_stock_info_sync
    # (no date args), which is why it must reconcile first in --bootstrap.
    contract:
      source: tushare
      storage:
        database: quant_data
        collection: stock_info
      completeness:
        kind: snapshot
        min_docs: 4000          # 全市场约 5500 只；低于此判定快照缺失
      window:
        start: "20100101"       # snapshot 模型不使用，占位以通过解析
        end: rolling
      sla: {}
      on_violation:
        auto_repair: true
        repair_task: run_stock_info_sync
        repair_args: []         # 显式空参：run_stock_info_sync 自动探测最新交易日
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]

  - id: stock_daily
    label: 股票日线
    job_status_key: stock_daily
    group: layer0
    depends_on: [tushare_daily_ready]
    trigger_on_complete: true    # dispatcher-triggered（删除 cron 17:30）
    run_mode: cron
    schedule_hint: "dispatcher-triggered after tushare_daily_ready（原 cron 17:30 已禁用）"
    freshness:
      database: quant_data
      collection: volume_price
      field: trade_date
      field_kind: date_string
    # ── Data contract (Phase 1) ────────────────────────────────────────────────
    # Declarative desired-state for the quant-data-engine reconciler
    # (run_data_contract_reconcile). Compares desired vs actual coverage and,
    # when --apply is set and auto_repair is true, backfills via repair_task.
    contract:
      source: tushare
      storage:
        database: quant_data
        collection: volume_price
        date_field: trade_date
        symbol_field: symbol
      window:
        start: "20100101"     # 商定的历史起点
        end: rolling          # rolling = 跟到最新交易日
      sla:
        max_lag_trading_days: 1    # 落后超过 1 个交易日 => 违约
        min_coverage_pct: 99.0     # 窗口内应有交易日缺失超过 1% => 违约
        min_symbols_latest_day: 4000   # 最新交易日个股数低于此 => 违约（0 关闭）
      on_violation:
        auto_repair: true
        repair_task: run_stock_daily
        repair_mode: by-date
        max_repair_window_days: 30   # 单次回填最大日历跨度，限频护栏
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]   # quoted: bare `on` is YAML boolean True

  - id: a_daily_realtime_sync
    label: A股实时日K同步
    job_status_key: a_daily_realtime_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "盘中可选 → daily_market_sync.sh realtime_daily_k；写 volume_price 快照与 market_spectrum_realtime_daily"
    freshness:
      database: finance
      collection: pipeline_tasks
      field: updated_at
      field_kind: datetime

  - id: a_daily_realtime_eod_compare
    label: 实时日K盘后等价性对比
    job_status_key: a_daily_realtime_eod_compare
    group: layer1
    depends_on: [stock_daily]
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "盘后 stock_daily 后可选 → daily_market_sync.sh realtime_daily_k_compare；用于 shadow mode 质量验证"
    freshness:
      database: finance
      collection: pipeline_tasks
      field: updated_at
      field_kind: datetime

  - id: stock_weekly
    label: 股票周线
    job_status_key: stock_weekly
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 周六 02:30 → daily_market_sync.sh stock_weekly（Tushare weekly）"
    freshness:
      database: quant_data
      collection: stock_weekly
      field: trade_date
      field_kind: date_string

  - id: stock_monthly
    label: 股票月线
    job_status_key: stock_monthly
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 每月 1 日 03:30 → daily_market_sync.sh stock_monthly（Tushare monthly）"
    freshness:
      database: quant_data
      collection: stock_monthly
      field: trade_date
      field_kind: date_string

  - id: index_daily
    label: 指数日线
    job_status_key: index_daily
    group: layer0
    depends_on: [tushare_daily_ready]
    trigger_on_complete: true    # dispatcher-triggered（删除 cron 17:45）
    run_mode: cron
    schedule_hint: "dispatcher-triggered after tushare_daily_ready（原 cron 17:45 已禁用）"
    freshness:
      database: quant_data
      collection: index_prices
      field: trade_date
      field_kind: date_string
    contract:
      source: tushare
      storage: { database: quant_data, collection: index_prices, date_field: trade_date, symbol_field: ts_code }
      window: { start: "20050104", end: rolling }   # index_prices earliest ≈ 2005
      sla: { max_lag_trading_days: 1, min_coverage_pct: 99.5, min_symbols_latest_day: 0 }
      on_violation:
        auto_repair: true
        repair_task: run_index_daily
        repair_args: ["--core", "--start", "{start}", "--end", "{end}"]
        max_repair_window_days: 60
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]

  - id: index_constituents
    label: 指数成分股
    job_status_key: index_constituents
    group: layer0
    depends_on: []
    trigger_on_complete: false   # 月末调仓，保持 cron 独立调度
    run_mode: cron
    schedule_hint: "Supercronic 工作日 17:50 → daily_market_sync.sh index_constituents"
    freshness:
      database: quant_data
      collection: index_constituents
      field: trade_date
      field_kind: date_string

  - id: etf_daily
    label: ETF日线
    job_status_key: etf_daily
    group: layer0
    depends_on: [tushare_daily_ready]
    trigger_on_complete: true    # dispatcher-triggered（删除 cron 18:00）
    run_mode: cron
    schedule_hint: "dispatcher-triggered after tushare_daily_ready（原 cron 18:00 已禁用）"
    freshness:
      database: quant_data
      collection: etf_daily
      field: trade_date
      field_kind: date_string
    contract:
      source: tushare
      storage: { database: quant_data, collection: etf_daily, date_field: trade_date, symbol_field: ts_code }
      window: { start: "20070104", end: rolling }   # etf_daily earliest ≈ 2007
      sla: { max_lag_trading_days: 1, min_coverage_pct: 99.0, min_symbols_latest_day: 0 }
      on_violation:
        auto_repair: true
        repair_task: run_etf_daily
        repair_args: ["--all", "--start", "{start}", "--end", "{end}"]   # 全市场按日回填
        max_repair_window_days: 60
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]

  - id: etf_share_size
    label: ETF份额规模
    job_status_key: etf_share_size
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 工作日 19:05 → daily_market_sync.sh etf_share_size（Tushare etf_share_size，建议 19 点后）"
    freshness:
      database: quant_data
      collection: etf_share_size
      field: trade_date
      field_kind: date_string
    # ── Data contract ─────────────────────────────────────────────────────────
    # ETF share size is a daily snapshot (one row per fund per trade_date).
    # Use calendar_trading_days to detect gaps and auto-backfill.
    contract:
      source: tushare
      storage: { database: quant_data, collection: etf_share_size, date_field: trade_date, symbol_field: ts_code }
      window: { start: "20200101", end: rolling }
      sla: { max_lag_trading_days: 3, min_coverage_pct: 95.0, min_symbols_latest_day: 0 }
      on_violation:
        auto_repair: true
        repair_task: run_etf_share_size
        repair_args: ["--start", "{start}", "--end", "{end}"]
        max_repair_window_days: 90
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]

  - id: financial_sync
    label: 财务数据
    job_status_key: financial_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false   # 季报周期数据，保持 cron 独立调度
    run_mode: cron
    schedule_hint: "Supercronic 工作日 18:15 → daily_market_sync.sh financial（季报期外大多空跑，保持 cron 独立）"
    # 仍为一条入库任务；新鲜度在 services/data_monitoring 中按 freshness_sheets 展开为 4 行
    freshness:
      database: quant_data
      field: end_date
      field_kind: date_string
      freshness_sheets:
        - { label: 利润表, collection: financial_income }
        - { label: 资产负债表, collection: financial_balance }
        - { label: 现金流量表, collection: financial_cashflow }
        - { label: 财务指标, collection: financial_indicator }
      # 各表分别：全库 max(end_date) 为 L 时，stock_info 宇宙内已有该期数据的 ts_code 占比
      coverage:
        universe_database: quant_data
        universe_collection: stock_info
        match_key: ts_code
        universe_period_filter:
          field: list_date
          op: lte_period
    # ── Data contract (Phase 3, report-period model) ───────────────────────────
    # Completeness is measured by report period (quarter-ends whose disclosure
    # deadline has passed), not trading day. A period is "present" when its
    # row count reaches per_period_min_coverage_pct of stocks listed by then.
    # Deep coverage starts ~2018 (pre-2018 is sparse); monitor financial_income
    # as the representative sheet.
    contract:
      source: tushare
      # Per-period coverage is measured against the stock_info universe, so that
      # reference snapshot must be filled first on a cold start.
      depends_on: [stock_info]
      storage: { database: quant_data, collection: financial_income, date_field: end_date, symbol_field: ts_code }
      window: { start: "20180101", end: rolling }
      completeness:
        kind: report_periods
        per_period_min_coverage_pct: 80.0
        universe: { database: quant_data, collection: stock_info, match_key: ts_code, list_date_field: list_date }
      sla:
        max_lag_trading_days: 1     # here a "unit" is a report period: ≤1 period behind
        min_coverage_pct: 99.0      # fraction of mature periods that must be present
        min_symbols_latest_day: 0
      on_violation:
        auto_repair: true
        repair_task: run_financial_sync
        repair_args: ["--all", "--period-range", "{start}:{end}"]
        max_repair_window_days: 730   # group up to ~2y of quarter-ends per backfill
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]

  - id: moneyflow
    label: 资金流向
    job_status_key: moneyflow
    group: layer0
    depends_on: [tushare_daily_ready]
    trigger_on_complete: true    # dispatcher-triggered（删除 cron 18:30）
    run_mode: cron
    schedule_hint: "dispatcher-triggered after tushare_daily_ready（原 cron 18:30 已禁用）"
    freshness:
      database: quant_data
      collection: money_flow
      field: trade_date
      field_kind: date_string
    contract:
      source: tushare
      storage: { database: quant_data, collection: money_flow, date_field: trade_date, symbol_field: ts_code }
      window: { start: "20240102", end: rolling }   # Tushare moneyflow available from 2024
      sla: { max_lag_trading_days: 2, min_coverage_pct: 99.0, min_symbols_latest_day: 0 }
      on_violation:
        auto_repair: true
        repair_task: run_moneyflow_sync
        repair_args: ["--start", "{start}", "--end", "{end}"]
        max_repair_window_days: 30
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]

  - id: earnings_sync
    label: 业绩数据
    job_status_key: earnings_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false   # 季报周期数据，保持 cron 独立调度
    run_mode: cron
    schedule_hint: "Supercronic 工作日 18:30 → daily_market_sync.sh earnings（季报期外大多空跑，保持 cron 独立）"
    freshness:
      database: quant_data
      collection: earnings
      field: trade_date
      field_kind: date_string
    # ── Data contract (Phase 3, run-recency model) ─────────────────────────────
    # Earnings is announcement-driven and only partially disclosed, so coverage
    # is undefined. Instead the contract checks that the sync ran recently
    # (pipeline_tasks/job_status updated_at) and re-runs it when overdue.
    contract:
      source: tushare
      storage: { database: quant_data, collection: earnings_forecast, date_field: ann_date, symbol_field: ts_code }
      window: { start: "20180101", end: rolling }
      completeness:
        kind: run_recency
      sla:
        max_run_lag_days: 3        # alert/repair if earnings_sync hasn't run in 3 days
      on_violation:
        auto_repair: true
        repair_task: run_earnings_sync
        repair_args: ["--days", "7"]
        max_repair_window_days: 30
      alert:
        channels: [email, data_pulse]
        "on": [repair_failed, still_violated]

  - id: cn_macro_sync
    label: 国内宏观数据
    job_status_key: cn_macro_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 工作日 19:40 → daily_market_sync.sh cn_macro_sync（shibor/LPR/PMI/CPI/PPI/M2/社融/GDP）"
    freshness:
      database: quant_data
      field: date
      field_kind: date_string
      freshness_sheets:
        - { label: 国内利率, collection: cn_macro_rates, field: date }
        - { label: 月度宏观, collection: cn_macro_monthly, field: month }
        - { label: 季度GDP, collection: cn_macro_quarterly, field: quarter }

  - id: us_rates_sync
    label: 美国利率数据
    job_status_key: us_rates_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 工作日 06:35 → daily_market_sync.sh us_rates_sync（TYCR/TRYCR/TBR/TLTR/TRLTR）"
    freshness:
      database: quant_data
      collection: us_rates_daily
      field: date
      field_kind: date_string

  - id: ladder_sync
    label: 连板天梯
    job_status_key: ladder_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: loop
    schedule_hint: "start.sh：DEPLOY_MODE=domestic 或 full 时常驻 run_ladder_sync --loop（LADDER_SYNC_INTERVAL，默认 60s）；不在 crontab 中"
    freshness:
      database: quant_data
      collection: limit_up_ladder
      field: date
      field_kind: date_string

  - id: industry_sync
    label: 行业与ETF聚合
    job_status_key: industry_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: loop
    schedule_hint: "start.sh：DEPLOY_MODE=domestic 或 full 时常驻 run_industry_sync --loop（INDUSTRY_SYNC_INTERVAL，默认 3600s）；盘后 15:30+ 才跑同步；不在 crontab 中"
    freshness:
      database: quant_data
      collection: market_industry_quotes_daily
      field: date
      field_kind: date_string

  - id: hot_stock_sync
    label: 热股同步
    job_status_key: hot_stock_sync
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 工作日 10:30/11:30/14:00/15:00/16:00/18:00/20:00/22:10 → daily_market_sync.sh hotstock；同步 THS + DC 原始热股榜单"
    freshness:
      database: quant_data
      collection: hot_stock_raw
      field: trade_date
      field_kind: date_string

  - id: international_news
    label: 国际新闻缓存
    job_status_key: international_news
    group: layer0
    depends_on: []
    trigger_on_complete: false
    run_mode: loop
    schedule_hint: "start.sh：DEPLOY_MODE=overseas 或 full 时常驻 run_international_news_sync --loop（INTL_NEWS_SYNC_INTERVAL，默认 1800s）；可选 SECONDARY_MONGO_URI → --sync-uri；domestic 不启动"
    freshness:
      database: quant_data
      collection: international_news_cache
      field: fetched_at
      field_kind: datetime
      document_id: "latest"

  # ── Layer 1: Depends on Layer 0 ───────────────────────────────────────────────

  - id: market_sentiment
    label: 市场情绪阴阳谱
    job_status_key: market_sentiment
    group: layer1
    depends_on: [stock_daily]
    trigger_on_complete: true    # dispatcher-triggered after stock_daily（原 cron 18:45 已禁用）
    run_mode: cron
    schedule_hint: "dispatcher-triggered after stock_daily（原 cron 18:45 已禁用）"
    freshness:
      database: quant_data
      collection: market_spectrum
      field: trade_date
      field_kind: date_string

  - id: theme_lag_candidates
    label: 主题补涨候选
    job_status_key: theme_lag_candidates
    group: layer1
    depends_on: [stock_daily, ladder_sync, index_constituents]
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 工作日（ladder_sync 盘后稳定后）→ daily_market_sync.sh theme_lag；成功后串联 theme_lag_candidate_validation"
    freshness:
      database: quant_data
      collection: theme_lag_candidates
      field: trade_date
      field_kind: date_string

  - id: risk_scan_a
    label: A股风险扫描
    job_status_key: risk_scan_a
    group: layer1
    depends_on: [stock_daily, index_daily]
    trigger_on_complete: false
    run_mode: cron
    schedule_hint: "Supercronic 工作日 19:30 → daily_market_sync.sh risk_scan_a（9个A股板块）"
    freshness:
      database: quant_data
      collection: risk_scan
      field: trade_date
      field_kind: date_string

  # ── Layer 2: Depends on Layer 1 ───────────────────────────────────────────────

  - id: theme_lag_candidate_validation
    label: 主题补涨验证
    job_status_key: theme_lag_candidate_validation
    group: layer2
    depends_on: [theme_lag_candidates, stock_daily]
    trigger_on_complete: false   # 目前由 daily_market_sync.sh 串联调用；改 true 后由 dispatcher 接管
    run_mode: cron
    schedule_hint: "daily_market_sync.sh theme_lag 中在 theme_lag_candidates 成功后串联调用"
    freshness:
      database: quant_data
      collection: theme_lag_candidate_validation
      field: trade_date
      field_kind: date_string

  - id: stock_composite_scoring
    label: 综合评分
    job_status_key: stock_composite_scoring
    group: layer2
    depends_on: [stock_daily, financial_sync, moneyflow]
    trigger_on_complete: false   # 由 stock-scoring-system 独立调度，暂不纳入 dispatcher
    run_mode: on_demand
    schedule_hint: "日终/收盘后：本机或 cron 调 stock-scoring score_util --action core（沪深300+中证A500+中证500+中证1000+科创50 成分并集；全市场可用 --action all；与交易日检查一致时）；写入 job_status 与 data_collection pipeline_tasks"
    freshness:
      database: finance
      collection: stock_scores
      field: score_date
      field_kind: date_string

  # ── Layer 3: Analysis layer (quantAnalyzer, depends on L2) ────────────────────

  - id: limit_up_sector_batch
    label: 涨停板板块分析
    job_status_key: limit_up_sector_batch
    group: layer3
    depends_on: [ladder_sync, stock_composite_scoring]
    trigger_on_complete: false   # 由 quantAnalyzer 自身 polling 驱动
    run_mode: loop
    schedule_hint: "quantAnalyzer 常驻服务，polling analysis_tasks 集合；sector_queue 模式下实时触发"
    freshness:
      database: finance
      collection: analysis_history
      field: created_at
      field_kind: datetime
